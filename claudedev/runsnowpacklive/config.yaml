# snowpack_steiermark/config.yaml

stations:
  - id: TAMI
    name: "Gesäuse Tamischbachturm"
    snow_station: TAMI2
    wind_station: TAMI1
    latitude: 47.617163
    longitude: 14.717084
    altitude: 1425
    ilwr: false
    tss: true    # TSG field from lawinen.at is actually TSS; rename handled in downloader

  - id: LOSE
    name: "Altaussee Loser"
    snow_station: LOSE2
    wind_station: LOSE1
    latitude: 47.658886
    longitude: 13.784403
    altitude: 1573
    ilwr: true
    tss: true    # tg field from lawinen.at is actually TSS

  - id: VEIT
    name: "Veitsch"
    snow_station: VEIT2
    wind_station: VEIT1
    latitude: 47.638222
    longitude: 15.420722
    altitude: 1323
    ilwr: true
    tss: true    # tg field from lawinen.at is actually TSS

  - id: PLAN
    name: "Planneralm"
    snow_station: PLAN2
    wind_station: PLAN1
    latitude: 47.40085
    longitude: 14.193223
    altitude: 1707
    ilwr: false
    tss: true    # TSG field from lawinen.at is actually TSS

  - id: GRBU
    name: "Großer Buchstein"
    snow_station: GRBU2
    wind_station: GRBU1
    latitude: 47.61243
    longitude: 14.60422
    altitude: 2089
    ilwr: true
    tss: true    # tg field from lawinen.at is actually TSS
    psum: true   # RR7/PINT7 = 7-min rain gauge; use as measured PSUM

  - id: LAWI
    name: "Tauplitz Lawinenstein"
    snow_station: LAWI2
    wind_station: LAWI1
    latitude: 47.59735
    longitude: 13.954379
    altitude: 1959
    ilwr: false   # no radiation sensor; ALLSKY_SW + ALLSKY_LW generated
    tss: true    # TSG field from lawinen.at is actually TSS

  - id: GAMS
    name: "Gamsfeld"
    snow_station: GAMS1
    wind_station: GAMS1  # single station; VW/DW already in snow station
    latitude: 47.449833
    longitude: 13.645167
    altitude: 2520
    ilwr: false   # no ILWR sensor; ALLSKY_LW generated
    tss: false   # TSS sensor reports >40% impossible values (<220K/-53°C); disabled

  - id: PORI
    name: "Polster Rinne"
    snow_station: PORI1
    wind_station: PORI1  # single station; VW/DW already in snow station
    latitude: 47.531306
    longitude: 14.957215
    altitude: 1731
    ilwr: false   # no ILWR sensor; ALLSKY_LW generated
    tss: true    # TSG field from lawinen.at is actually TSS

# backward-compat alias (used by git_sync, old code)
station:
  id: "TAMI"
  name: "Gesäuse Tamischbachturm"
  latitude: 47.617163
  longitude: 14.717084
  altitude: 1425

snowpack:
  binary: "/Applications/Snowpack/bin/snowpack"
  timeout: 3600

simulation:
  season_start_month: 9
  season_start_day: 1
  restart_from_sno: true

git:
  repo_path: "../.."
  branch: "main"
  auto_push: true
  commit_message_template: "SNOWPACK update {station} {date}"

web:
  host: "0.0.0.0"
  port: 5001
  debug: false

paths:
  data: "data"
  logs: "logs"
  state: "state"
